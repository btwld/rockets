name: Bug report
description: Report a bug or unexpected behavior.
body:
  - type: dropdown
    attributes:
      label: Package
      description: Which package is affected?
      options:
        - "@bitwild/rockets"
        - "@bitwild/rockets-auth"
        - Both
    validations:
      required: true
  - type: input
    attributes:
      label: Version
      description: What version of the package are you using?
      placeholder: "1.0.0-alpha.7"
    validations:
      required: true
  - type: textarea
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      description: |
        Provide a minimal set of steps to reproduce the issue.
        Include code snippets or a link to a repository if possible.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages or logs if applicable.
    validations:
      required: true
  - type: input
    attributes:
      label: Node.js version
      placeholder: "v20.11.0"
  - type: input
    attributes:
      label: NestJS version
      placeholder: "^11.0.0"
